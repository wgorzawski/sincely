name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run shared module tests
        run: ./gradlew :shared:allTests --stacktrace

      - name: Assemble Android debug build
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-test-reports
          path: shared/build/reports/tests
          if-no-files-found: ignore
